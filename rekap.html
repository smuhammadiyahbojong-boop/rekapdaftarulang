<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Daftar Ulang – SMK Muhammadiyah Bojong</title>
<style>
  :root {
    --green-dark: #1a5c2e;
    --green-mid: #2d8a4e;
    --green-light: #e8f5ec;
    --red-muh: #cc2020;
    --text-main: #1a1a1a;
    --text-muted: #5a5a5a;
    --border: #d0d0c8;
    --bg: #f7f6f2;
    --white: #ffffff;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }

  header { background: var(--green-dark); color: white; padding: 0; }
  .header-top { display: flex; align-items: center; gap: 14px; padding: 14px 20px 10px; }
  .logo-circle { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-circle img { width: 100%; height: 100%; object-fit: contain; }
  .header-text h1 { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .header-text p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-banner { background: var(--red-muh); text-align: center; font-size: 11px; letter-spacing: 0.5px; padding: 5px 12px; font-weight: 600; }

  nav { background: var(--green-mid); display: flex; }
  nav a { flex: 1; text-align: center; color: white; text-decoration: none; padding: 10px 8px; font-size: 13px; font-weight: 600; opacity: 0.75; border-bottom: 3px solid transparent; }
  nav a.active { opacity: 1; border-bottom-color: white; }

  main { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-card .num { font-size: 32px; font-weight: 700; color: var(--green-dark); line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .section-title {
    font-size: 13px; font-weight: 700;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--green-light);
    display: flex; align-items: center; justify-content: space-between;
  }

  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px; align-items: center;
  }
  .toolbar input {
    flex: 1; min-width: 140px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    background: var(--white);
  }
  .toolbar input:focus { outline: none; border-color: var(--green-mid); }

  .btn-refresh {
    background: var(--green-dark); color: white;
    border: none; border-radius: 7px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .btn-refresh:active { opacity: 0.8; }

  .btn-export {
    background: var(--white); color: var(--green-dark);
    border: 1.5px solid var(--green-dark); border-radius: 7px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; text-decoration: none; display: inline-block;
  }

  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--white); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 580px; }
  thead tr { background: var(--green-dark); color: white; }
  thead th { padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: 0.3px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--green-light); }
  tbody td { padding: 9px 12px; vertical-align: top; }
  .no-col { width: 36px; text-align: center; color: var(--text-muted); font-size: 12px; }
  .badge { display: inline-block; background: var(--green-light); color: var(--green-dark); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .badge-red { background: #fdeaea; color: var(--red-muh); }

  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .spinner-lg { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--green-light); border-top-color: var(--green-mid); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty .icon { font-size: 40px; margin-bottom: 10px; }

  .last-update { font-size: 11px; color: var(--text-muted); }

  .bar-wrap { margin-bottom: 20px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bar-label { font-size: 12px; width: 120px; flex-shrink: 0; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; background: var(--green-light); border-radius: 4px; height: 16px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--green-dark); border-radius: 4px; transition: width 0.6s ease; }
  .bar-count { font-size: 12px; font-weight: 700; color: var(--green-dark); width: 24px; text-align: right; }

  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--text-muted); }
  .tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }

  @media (max-width: 480px) {
    .header-text h1 { font-size: 13px; }
    thead th:nth-child(5) { display: none; }
    tbody td:nth-child(5) { display: none; }
  }
</style>
</head>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="num" id="total-count">–</div>
      <div class="lbl">Total Daftar</div>
    </div>
    <div class="stat-card">
      <div class="num" id="hari-count">–</div>
      <div class="lbl">Hari Ini</div>
    </div>
    <div class="stat-card" style="border-top:3px solid #1a5c2e">
      <div class="num" id="tsm-count" style="color:#1a5c2e">–</div>
      <div class="lbl">TSM</div>
    </div>
    <div class="stat-card" style="border-top:3px solid #cc2020">
      <div class="num" id="bdp-count" style="color:#cc2020">–</div>
      <div class="lbl">Broadcasting</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('tabel')">📋 Tabel Data</div>
    <div class="tab" onclick="switchTab('chart')">📈 Statistik</div>
  </div>

  <div id="tab-tabel">
    <div class="toolbar">
      <input type="text" id="search" placeholder="🔍 Cari nama / sekolah / no. daftar..." oninput="filterTabel()" />
      <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
      <a class="btn-export" id="btn-export" href="#" onclick="exportCSV()">⬇ Export CSV</a>
    </div>

    <div class="section-title">
      <span>Data Pendaftar</span>
      <span class="last-update" id="last-update"></span>
    </div>

    <div id="table-area">
      <div class="loading"><div class="spinner-lg"></div><br>Memuat data...</div>
    </div>
  </div>

  <div id="tab-chart" style="display:none">
    <div class="section-title">Rekap Per Jurusan</div>
    <div id="chart-jurusan" class="bar-wrap"></div>
    <div class="section-title" style="margin-top:20px">Rekap Per Asal Sekolah</div>
    <div id="chart-sekolah" class="bar-wrap"></div>
    <div class="section-title" style="margin-top:20px">Rekap Per Hari</div>
    <div id="chart-hari" class="bar-wrap"></div>
  </div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbw5rKSCwGtMSep2BJz5aR4nAcG2uwq3_V_prL6tZERcSNY1bLe8lnip8zsMiCuDhIwjmA/exec";

let allData = [];

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && name==='tabel') || (i===1 && name==='chart')));
  document.getElementById('tab-tabel').style.display = name === 'tabel' ? '' : 'none';
  document.getElementById('tab-chart').style.display = name === 'chart' ? '' : 'none';
  if (name === 'chart') renderCharts();
}

async function loadData() {
  document.getElementById('table-area').innerHTML = '<div class="loading"><div class="spinner-lg"></div><br>Memuat data...</div>';
  try {
    const res = await fetch(SHEET_URL + '?action=getAll&_=' + Date.now());
    const json = await res.json();
    allData = json.data || [];
    updateStats();
    renderTable(allData);
    document.getElementById('last-update').textContent = 'Update: ' + new Date().toLocaleTimeString('id');
  } catch(e) {
    document.getElementById('table-area').innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Gagal memuat data.<br><small>Pastikan URL Google Sheet sudah dikonfigurasi.</small></p></div>`;
  }
}

function updateStats() {
  document.getElementById('total-count').textContent = allData.length;
  const todayDate = new Date().getDate();
  const hari = allData.filter(r => (r.hari_tgl||'').includes(todayDate)).length;
  document.getElementById('hari-count').textContent = hari;
  const tsm = allData.filter(r => (r.jurusan||'').toLowerCase().includes('sepeda motor')).length;
  const bdp = allData.filter(r => (r.jurusan||'').toLowerCase().includes('broadcasting')).length;
  document.getElementById('tsm-count').textContent = tsm;
  document.getElementById('bdp-count').textContent = bdp;
}

function jurusanBadge(j) {
  if (!j || j === '-') return '<span style="font-size:11px;color:var(--text-muted)">–</span>';
  const isTSM = j.toLowerCase().includes('sepeda motor');
  const color = isTSM ? 'background:#e8f5ec;color:#1a5c2e' : 'background:#fdeaea;color:#cc2020';
  const label = isTSM ? 'TSM' : 'BDP';
  return `<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;${color}">${label}</span>`;
}

function renderTable(data) {
  if (!data.length) {
    document.getElementById('table-area').innerHTML = '<div class="empty"><div class="icon">📭</div><p>Belum ada data pendaftar.</p></div>';
    return;
  }
  let rows = data.map((r,i) => `
    <tr>
      <td class="no-col">${i+1}</td>
      <td><span class="badge">${r.no_pendaftaran||'-'}</span></td>
      <td><strong>${r.nama||'-'}</strong></td>
      <td>${jurusanBadge(r.jurusan)}</td>
      <td>${r.asal_sekolah||'-'}</td>
      <td style="font-size:12px;color:var(--text-muted)">${r.alamat||'-'}</td>
      <td>${r.telepon||'-'}</td>
      <td><span class="badge ${r.keterangan&&r.keterangan!=='-'?'':'badge-red'}">${r.keterangan||'-'}</span></td>
      <td style="font-size:11px;color:var(--text-muted);white-space:nowrap">${r.hari_tgl||'-'}</td>
    </tr>`).join('');

  document.getElementById('table-area').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th>
          <th>No. Daftar</th>
          <th>Nama</th>
          <th>Jurusan</th>
          <th>Asal Sekolah</th>
          <th>Alamat</th>
          <th>Telepon</th>
          <th>Keterangan</th>
          <th>Hari/Tgl</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function filterTabel() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(r =>
    (r.nama||'').toLowerCase().includes(q) ||
    (r.asal_sekolah||'').toLowerCase().includes(q) ||
    (r.no_pendaftaran||'').toLowerCase().includes(q)
  );
  renderTable(filtered);
}

function renderCharts() {
  const jurusanMap = {};
  const sekolahMap = {};
  const hariMap = {};
  allData.forEach(r => {
    const j = (r.jurusan||'Belum diisi').trim();
    jurusanMap[j] = (jurusanMap[j]||0) + 1;
    const s = (r.asal_sekolah||'Tidak diketahui').trim();
    sekolahMap[s] = (sekolahMap[s]||0) + 1;
    const h = (r.hari_tgl||'').split(',')[0].trim() || 'Lainnya';
    hariMap[h] = (hariMap[h]||0) + 1;
  });

  renderBar('chart-jurusan', jurusanMap);
  renderBar('chart-sekolah', sekolahMap);
  renderBar('chart-hari', hariMap);
}

function renderBar(id, map) {
  const entries = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,10);
  const max = Math.max(...entries.map(e=>e[1]), 1);
  const html = entries.map(([label, count]) => `
    <div class="bar-row">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>`).join('');
  document.getElementById(id).innerHTML = html || '<p style="color:var(--text-muted);font-size:13px">Belum ada data.</p>';
}

function exportCSV() {
  if (!allData.length) { alert('Belum ada data!'); return; }
  const cols = ['hari_tgl','no_pendaftaran','nama','asal_sekolah','alamat','telepon','keterangan'];
  const header = ['Hari/Tgl','No Pendaftaran','Nama','Asal Sekolah','Alamat','Telepon','Keterangan'];
  const rows = allData.map(r => cols.map(c => `"${(r[c]||'').replace(/"/g,'""')}"`).join(','));
  const csv = [header.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `rekap-spmb-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

loadData();
setInterval(loadData, 30000);
